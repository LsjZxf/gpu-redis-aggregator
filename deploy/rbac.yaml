apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-redis-aggregator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpu-redis-aggregator
rules:
  - apiGroups: [""]
    resources: ["nodes", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpu-redis-aggregator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gpu-redis-aggregator
subjects:
  - kind: ServiceAccount
    name: gpu-redis-aggregator
    namespace: default